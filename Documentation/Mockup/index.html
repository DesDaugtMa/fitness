<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
    <meta charset="UTF-8">
    <!-- Wichtige Meta-Tags für iOS / Mobile: Verhindert Auto-Zoom, setzt korrekte Breite -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Trainingsplan erstellen</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Choices.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <!-- Bootstrap Icons (Optional für UI) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid wrapper">
        <!-- Header / Navigation -->
        <header class="d-flex justify-content-between align-items-center py-3 mb-4 border-bottom">
            <h5 class="mb-0 fw-bold">Neuer Trainingsplan</h5>
            <button id="themeToggle" class="btn btn-outline-secondary btn-sm rounded-circle shadow-sm" aria-label="Toggle Darkmode">
                <i class="bi bi-moon-fill" id="themeIcon"></i>
            </button>
        </header>

        <form id="trainingPlanForm" class="needs-validation" novalidate onsubmit="return false;">
            
            <!-- Globaler Error-Container -->
            <div id="globalError" class="alert alert-danger d-none shadow-sm" role="alert"></div>

            <!-- Plan Name -->
            <div class="card mb-4 shadow-sm border-0 plan-card">
                <div class="card-body">
                    <div class="form-group">
                        <label for="planName" class="form-label fw-bold">Name des Plans <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="planName" placeholder="z.B. Push / Pull / Legs" required>
                        <div class="invalid-feedback">
                            Bitte gib einen Namen für den Trainingsplan ein.
                        </div>
                    </div>
                </div>
            </div>

            <!-- Übung hinzufügen -->
            <div class="card mb-4 shadow-sm border-0 plan-card">
                <div class="card-body">
                    <label for="exerciseSelect" class="form-label fw-bold">Übung hinzufügen</label>
                    <div class="input-group">
                        <select id="exerciseSelect" class="form-control">
                            <option value="">Wähle eine Übung...</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Liste der ausgewählten Übungen -->
            <h6 class="fw-bold mb-3 d-flex justify-content-between align-items-center">
                <span>Übungen im Plan</span>
                <span id="exerciseCountBadge" class="badge bg-primary rounded-pill">0</span>
            </h6>

            <!-- Leerer Status -->
            <div id="emptyState" class="text-center p-4 mb-4 rounded-3 text-muted">
                <i class="bi bi-card-list fs-1 mb-2 d-block text-secondary opacity-50"></i>
                Keine Übungen hinzugefügt. <br> Wähle oben eine Übung aus.
            </div>

            <!-- Übungsliste (SortableJS Container) -->
            <div id="selectedExercisesList" class="mb-5 list-group">
                <!-- Übungen werden hier dynamisch per JS eingefügt -->
            </div>

            <!-- Submit Button (Sticky Bottom auf Mobile) -->
            <div class="sticky-bottom-action p-3 mt-4 border-top">
                <button type="submit" id="savePlanBtn" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow">
                    Plan speichern
                </button>
            </div>
            
        </form>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Choices.js (Wie in Create.cshtml) -->
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <!-- Sortable.js (Für Drag & Drop) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
